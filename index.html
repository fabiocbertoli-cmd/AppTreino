<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Fábio - Tracker Interativo</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for beautiful UI */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col pb-24">

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 px-4 py-4 shadow-lg backdrop-blur-md bg-opacity-95">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-500/10 p-2.5 rounded-xl border border-emerald-500/20 text-emerald-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4M6 12h12M4 8h16M4 16h16"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white">Treino Fábio</h1>
                    <p class="text-xs text-slate-400 font-medium">Personalizado & Interativo</p>
                </div>
            </div>
            
            <button onclick="confirmReset()" class="text-xs font-semibold text-slate-400 hover:text-rose-400 bg-slate-800/60 hover:bg-rose-950/20 px-3 py-2 rounded-lg border border-slate-700/60 transition-all flex items-center gap-1.5 active:scale-95">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H19M9 11l3-3 3 3m-3-3v12"></path>
                </svg>
                Reset
            </button>
        </div>
    </header>

    <div class="bg-slate-900/40 py-2.5 border-b border-slate-800/80 px-4">
        <div class="max-w-md mx-auto flex items-center justify-between gap-4">
            <div class="flex-1">
                <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-emerald-500 to-teal-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
            <span id="progress-text" class="text-xs font-bold text-emerald-400 whitespace-nowrap">0% concluído</span>
        </div>
    </div>

    <nav class="bg-slate-900/20 p-2 sticky top-[73px] z-40 backdrop-blur-md">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-1.5">
            <button onclick="switchTab(1)" id="tab-1" class="tab-btn py-2.5 rounded-xl text-xs font-bold transition-all text-center flex flex-col items-center justify-center gap-0.5 border">
                <span>DIA 1</span>
                <span class="text-[9px] opacity-75 truncate max-w-full px-1">Costas</span>
            </button>
            <button onclick="switchTab(2)" id="tab-2" class="tab-btn py-2.5 rounded-xl text-xs font-bold transition-all text-center flex flex-col items-center justify-center gap-0.5 border">
                <span>DIA 2</span>
                <span class="text-[9px] opacity-75 truncate max-w-full px-1">Peito</span>
            </button>
            <button onclick="switchTab(3)" id="tab-3" class="tab-btn py-2.5 rounded-xl text-xs font-bold transition-all text-center flex flex-col items-center justify-center gap-0.5 border">
                <span>DIA 3</span>
                <span class="text-[9px] opacity-75 truncate max-w-full px-1">Pernas</span>
            </button>
            <button onclick="switchTab(4)" id="tab-4" class="tab-btn py-2.5 rounded-xl text-xs font-bold transition-all text-center flex flex-col items-center justify-center gap-0.5 border">
                <span>DIA 4</span>
                <span class="text-[9px] opacity-75 truncate max-w-full px-1">Braços</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 max-w-md w-full mx-auto px-4 py-6">
        <div class="mb-6">
            <h2 id="workout-day-title" class="text-xl font-extrabold text-white tracking-wide">Dia 1 - Costas e Bíceps</h2>
            <p id="workout-day-subtitle" class="text-sm text-slate-400 mt-0.5">Foco em puxadas verticais e flexões de cotovelo.</p>
        </div>

        <div id="exercise-list" class="space-y-5">
            </div>
    </main>

    <div id="timer-widget" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 border border-slate-700/80 shadow-2xl rounded-2xl px-5 py-3.5 flex items-center gap-4 z-50 transition-all duration-300 scale-100 max-w-xs w-[90%]">
        <div class="bg-emerald-500/10 p-2 rounded-xl text-emerald-400">
            <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        <div class="flex-1">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Descanso</p>
            <p id="timer-display" class="text-2xl font-black text-white font-mono leading-none mt-0.5">01:00</p>
        </div>
        <div class="flex items-center gap-1.5">
            <button onclick="adjustTimer(-10)" class="bg-slate-800 active:bg-slate-700 p-2 rounded-lg text-xs font-bold text-slate-300 active:scale-95">-10s</button>
            <button onclick="toggleTimer()" id="timer-play-btn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 p-2.5 rounded-xl font-bold transition-all active:scale-95">
                <svg id="play-icon" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button onclick="adjustTimer(10)" class="bg-slate-800 active:bg-slate-700 p-2 rounded-lg text-xs font-bold text-slate-300 active:scale-95">+10s</button>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-xs w-full text-center shadow-2xl animate-in fade-in zoom-in-95 duration-200">
            <div id="modal-icon-container" class="mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4"></div>
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2">Mensagem</h3>
            <p id="modal-desc" class="text-sm text-slate-400 mb-6 leading-relaxed">Instrução ou descrição.</p>
            <div class="flex gap-2.5" id="modal-actions"></div>
        </div>
    </div>

    <script>
        const workoutData = {
            1: {
                title: "Dia 1 - Costas e Bíceps",
                subtitle: "Foco em puxadas verticais e flexões de cotovelo.",
                exercises: [
                    { id: "d1-ex1", name: "Puxada Alta Pronada", sets: 4, reps: "10 a 12", type: "Puxada Vertical" },
                    { id: "d1-ex2", name: "Remada Curvada com Barra", sets: 4, reps: "8 a 10", type: "Tronco inclinado" },
                    { id: "d1-ex3", name: "Remada Baixa com Triângulo", sets: 4, reps: "10 a 12", type: "Horizontal" },
                    { id: "d1-ex4", name: "Rosca Direta com Barra W", sets: 4, reps: "10 a 12", type: "Flexão Cotovelo" },
                    { id: "d1-ex5", name: "Rosca Martelo com Halteres", sets: 4, reps: "12", type: "Pegada Neutra" }
                ]
            },
            2: {
                title: "Dia 2 - Peito e Tríceps",
                subtitle: "Foco em empurradas e extensões de cotovelo.",
                exercises: [
                    { id: "d2-ex1", name: "Supino Reto com Halteres", sets: 4, reps: "8 a 10", type: "Empurrar Horizontal" },
                    { id: "d2-ex2", name: "Supino Inclinado com Halteres", sets: 4, reps: "10 a 12", type: "Foco Superior" },
                    { id: "d2-ex3", name: "Crucifixo na Polia (Crossover)", sets: 4, reps: "12 a 15", type: "Abertura Braços" },
                    { id: "d2-ex4", name: "Tríceps Testa com Barra W", sets: 4, reps: "10 a 12", type: "Flexão Cotovelo" },
                    { id: "d2-ex5", name: "Tríceps Pulley (Corda)", sets: 4, reps: "12 a 15", type: "Extensão Vertical" }
                ]
            },
            3: {
                title: "Dia 3 - Perna Completa",
                subtitle: "Foco em quadríceps, isquiotibiais e panturrilha.",
                exercises: [
                    { id: "d3-ex1", name: "Agachamento Livre ou Leg Press", sets: 4, reps: "8 a 10", type: "Flexão Quadril / Joelho" },
                    { id: "d3-ex2", name: "Cadeira Extensora", sets: 4, reps: "12 a 15", type: "Foco Quadríceps" },
                    { id: "d3-ex3", name: "Stiff com Halteres ou Barra", sets: 4, reps: "10 a 12", type: "Foco Posterior" },
                    { id: "d3-ex4", name: "Cadeira Flexora", sets: 4, reps: "10 a 12", type: "Flexão Joelho" },
                    { id: "d3-ex5", name: "Gêmeos em Pé", sets: 4, reps: "15 a 20", type: "Panturrilhas" }
                ]
            },
            4: {
                title: "Dia 4 - Superior, Braços e Abdômen",
                subtitle: "Foco em ombros, braços e core isométrico.",
                exercises: [
                    { id: "d4-ex1", name: "Desenvolvimento com Halteres", sets: 4, reps: "10", type: "Empurrar Vertical" },
                    { id: "d4-ex2", name: "Elevação Lateral com Halteres", sets: 4, reps: "12 a 15", type: "Abdução Ombro" },
                    { id: "d4-ex3", name: "Crucifixo Inverso com Halteres", sets: 4, reps: "12", type: "Deltoide Posterior" },
                    { id: "d4-ex4", name: "Abdômen Supra", sets: 4, reps: "15", type: "Flexão do Core" },
                    { id: "d4-ex5", name: "Prancha Isométrica", sets: 3, reps: "45 seg", type: "Isometria Core" }
                ]
            }
        };

        let currentDay = 1;
        let completedSets = {}; 
        let timerSeconds = 60;
        let timerInterval = null;
        let defaultTimerSeconds = 60;

        window.addEventListener('load', () => {
            const savedState = localStorage.getItem('treino_fabio_state');
            const savedDay = localStorage.getItem('treino_fabio_day');
            if (savedState) completedSets = JSON.parse(savedState);
            if (savedDay) currentDay = parseInt(savedDay);
            switchTab(currentDay);
            resetTimerUI();
        });

        function switchTab(dayId) {
            currentDay = dayId;
            localStorage.setItem('treino_fabio_day', currentDay);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-500', 'text-slate-950', 'border-emerald-400/30', 'shadow-emerald-500/10', 'shadow-lg');
                btn.classList.add('bg-slate-900/60', 'text-slate-400', 'border-slate-800/80');
            });

            const activeTab = document.getElementById(`tab-${dayId}`);
            activeTab.classList.remove('bg-slate-900/60', 'text-slate-400', 'border-slate-800/80');
            activeTab.classList.add('bg-emerald-500', 'text-slate-950', 'border-emerald-400/30', 'shadow-emerald-500/10', 'shadow-lg');

            document.getElementById('workout-day-title').innerText = workoutData[dayId].title;
            document.getElementById('workout-day-subtitle').innerText = workoutData[dayId].subtitle;

            renderExercises(dayId);
            updateProgress();
        }

        function renderExercises(dayId) {
            const container = document.getElementById('exercise-list');
            container.innerHTML = '';
            const exercises = workoutData[dayId].exercises;

            exercises.forEach(ex => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800/90 rounded-2xl p-4 shadow-md transition-all duration-300";
                
                let setsButtonsHTML = '';
                for (let i = 1; i <= ex.sets; i++) {
                    const setId = `${ex.id}-set-${i}`;
                    const isChecked = completedSets[setId] ? true : false;
                    
                    setsButtonsHTML += `
                        <button onclick="toggleSet('${setId}')" id="btn-${setId}" class="flex-1 py-3 px-2 rounded-xl border text-xs font-bold transition-all duration-200 flex flex-col items-center justify-center gap-1 active:scale-95 ${
                            isChecked 
                            ? 'bg-emerald-500/15 border-emerald-500 text-emerald-400 shadow-inner' 
                            : 'bg-slate-800/50 border-slate-700/50 text-slate-300 hover:border-slate-600'
                        }">
                            <span class="text-[9px] uppercase tracking-wide opacity-60">Série</span>
                            <span class="text-base font-black">${i}</span>
                            <span class="w-2 h-2 rounded-full mt-0.5 transition-all ${isChecked ? 'bg-emerald-400 shadow-md shadow-emerald-400/50' : 'bg-slate-600'}"></span>
                        </button>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-start justify-between gap-2 mb-3">
                        <div>
                            <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-slate-800 text-emerald-400 tracking-wider uppercase border border-emerald-400/10 mb-1.5">${ex.type}</span>
                            <h3 class="font-bold text-base text-white leading-tight">${ex.name}</h3>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-bold text-slate-400 block uppercase">Alvo</span>
                            <span class="text-xs font-black text-slate-200">${ex.sets}x${ex.reps}</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-${ex.sets} gap-2 mt-4">
                        ${setsButtonsHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleSet(setId) {
            const button = document.getElementById(`btn-${setId}`);
            const circle = button.querySelector('span:last-child');
            
            if (completedSets[setId]) {
                delete completedSets[setId];
                button.className = "flex-1 py-3 px-2 rounded-xl border text-xs font-bold transition-all duration-200 flex flex-col items-center justify-center gap-1 active:scale-95 bg-slate-800/50 border-slate-700/50 text-slate-300 hover:border-slate-600";
                circle.className = "w-2 h-2 rounded-full mt-0.5 transition-all bg-slate-600";
            } else {
                completedSets[setId] = true;
                button.className = "flex-1 py-3 px-2 rounded-xl border text-xs font-bold transition-all duration-200 flex flex-col items-center justify-center gap-1 active:scale-95 bg-emerald-500/15 border-emerald-500 text-emerald-400 shadow-inner";
                circle.className = "w-2 h-2 rounded-full mt-0.5 transition-all bg-emerald-400 shadow-md shadow-emerald-400/50";
                startTimer();
            }

            localStorage.setItem('treino_fabio_state', JSON.stringify(completedSets));
            updateProgress();
        }

        function updateProgress() {
            const exercises = workoutData[currentDay].exercises;
            let totalSets = 0;
            let finishedSets = 0;

            exercises.forEach(ex => {
                for (let i = 1; i <= ex.sets; i++) {
                    totalSets++;
                    if (completedSets[`${ex.id}-set-${i}`]) finishedSets++;
                }
            });

            const percent = totalSets > 0 ? Math.round((finishedSets / totalSets) * 100) : 0;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent}% concluído`;
        }

        function resetTimerUI() {
            const min = Math.floor(timerSeconds / 60);
            const sec = timerSeconds % 60;
            document.getElementById('timer-display').innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            timerInterval ? pauseTimer() : startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (timerSeconds <= 0) timerSeconds = defaultTimerSeconds;

            document.getElementById('play-icon').classList.add('hidden');
            document.getElementById('pause-icon').classList.remove('hidden');

            timerInterval = setInterval(() => {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerSeconds = 0;
                    playAlarm();
                    showCustomModal(
                        'emerald',
                        'Descanso Concluído!',
                        'Seu tempo de descanso acabou. Hora de mandar ver na próxima série!',
                        [{ text: 'Bora!', action: closeModal, primary: true }]
                    );
                }
                resetTimerUI();
            }, 1000);
        }

        function pauseTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            document.getElementById('play-icon').classList.remove('hidden');
            document.getElementById('pause-icon').classList.add('hidden');
        }

        function adjustTimer(amount) {
            timerSeconds += amount;
            if (timerSeconds < 0) timerSeconds = 0;
            resetTimerUI();
            if (timerInterval) startTimer();
        }

        function playAlarm() {
            if (navigator.vibrate) navigator.vibrate([500, 250, 500]);
            document.getElementById('play-icon').classList.remove('hidden');
            document.getElementById('pause-icon').classList.add('hidden');
        }

        function showCustomModal(type, title, desc, actions) {
            const modal = document.getElementById('custom-modal');
            const iconContainer = document.getElementById('modal-icon-container');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const actionsEl = document.getElementById('modal-actions');

            if (type === 'rose') {
                iconContainer.className = "mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-rose-500/10 text-rose-400 border border-rose-500/20";
                iconContainer.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            } else {
                iconContainer.className = "mx-auto w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                iconContainer.innerHTML = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            titleEl.innerText = title;
            descEl.innerText = desc;
            actionsEl.innerHTML = '';
            
            actions.forEach(act => {
                const btn = document.createElement('button');
                btn.className = act.primary 
                    ? "flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-2.5 px-4 rounded-xl text-sm transition-all active:scale-95"
                    : "flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-xl text-sm transition-all border border-slate-700/60 active:scale-95";
                btn.innerText = act.text;
                btn.onclick = act.action;
                actionsEl.appendChild(btn);
            });

            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        function confirmReset() {
            showCustomModal(
                'rose',
                'Resetar Progresso?',
                'Isto irá limpar todas as séries concluídas deste treino. Tens a certeza?',
                [
                    { text: 'Cancelar', action: closeModal, primary: false },
                    { text: 'Sim, Limpar', action: executeReset, primary: true }
                ]
            );
        }

        function executeReset() {
            completedSets = {};
            localStorage.removeItem('treino_fabio_state');
            renderExercises(currentDay);
            updateProgress();
            closeModal();
        }
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registado com sucesso!', reg))
                    .catch(err => console.error('Erro ao registar o Service Worker', err));
            });
        }
    </script>
</body>
</html>
